name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y jq bats shellcheck
      - name: Build release binaries
        run: ./scripts/build-release-binaries.sh
      - name: ShellCheck
        run: shellcheck -x approve-compound-bash.sh
      - name: Tests
        run: bats test/
      - name: Go tests
        run: go test ./...
