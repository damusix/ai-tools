{{define "title"}} — Edit {{.Filename}}{{end}}
{{define "content"}}
<div class="editor-layout">
    <!-- Header -->
    <div class="flex items-center justify-between editor-header">
        <div class="flex items-center gap-3">
            <a href="/scripts" class="btn-ghost btn-ghost--compact">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
            </a>
            <span class="breadcrumb-text">Scripts</span>
            <span class="breadcrumb-text">/</span>
            <div>
                <div class="script-nav-dropdown" id="script-nav">
                    <button type="button" class="script-nav-trigger" onclick="toggleScriptNav()">
                        <h1 class="breadcrumb-filename">{{.Filename}}</h1>
                        <svg class="script-nav-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>
                    <div class="script-nav-panel" id="script-nav-panel"></div>
                </div>
                <input id="script-description" type="text" value="{{.Description}}" placeholder="Add a description..." onblur="saveDescription()" class="script-description-input">
            </div>
        </div>
        <div class="flex items-center gap-3">
            <span id="save-status" class="save-status"></span>
            <button id="ai-generate-btn" class="btn-ghost" title="Generate with AI" onclick="openAIDialog('script')">
                <i class="fa-solid fa-wand-magic-sparkles color-accent"></i>
            </button>
            <button id="save-btn" class="btn-primary">Save</button>
        </div>
    </div>

    <!-- Editor (resizable top portion) -->
    <div id="editor-container" class="editor-container"></div>

    <!-- Drag Handle -->
    <div id="resize-handle" class="resize-handle">
        <div class="resize-handle-bar"></div>
    </div>

    <!-- Console Panel -->
    <div id="console-panel" class="console-panel">
        <!-- Console Header -->
        <div class="console-header">
            <div class="flex items-center gap-3">
                <span class="console-label">Console</span>
                <select id="console-event" class="input dropdown-sm input--auto" onchange="updateConsolePayload()">
                    {{range .Events}}
                    <option value="{{.Name}}" data-description="{{.Desc}}">{{.Name}}</option>
                    {{end}}
                </select>
                <select id="testcase-select" class="input dropdown-sm input--auto" onchange="loadTestCase()">
                    <option value="">Default payload</option>
                </select>
                <button onclick="saveCurrentTestCase()" class="btn-ghost btn-ghost--compact" title="Save test case">
                    <i class="fa-solid fa-floppy-disk"></i>
                </button>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="openAIDialog('test')" class="btn-ghost btn-ghost--compact" title="Generate test with AI">
                    <i class="fa-solid fa-wand-magic-sparkles color-accent"></i>
                </button>
                <button id="run-btn" onclick="runTest()" class="btn-run">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                    Run
                </button>
                <button onclick="clearConsole()" class="btn-clear">Clear</button>
            </div>
        </div>

        <!-- Console Body: payload input + output -->
        <div class="console-body">
            <!-- Stdin Payload (left) -->
            <div class="console-stdin">
                <div class="console-section-label">stdin payload</div>
                <textarea id="console-payload" spellcheck="false" class="console-payload"></textarea>
            </div>

            <!-- Output (right) -->
            <div class="console-stdout">
                <div class="console-section-label console-section-label--between">
                    <span>output</span>
                    <span id="console-meta" class="console-meta"></span>
                </div>
                <div id="console-output" class="console-output">
                    <span class="color-muted">Click Run to execute the script with the payload on the left.
The payload simulates what Claude Code sends to your hook.</span>
                </div>
            </div>
        </div>
    </div>
</div>

<pre id="script-content" class="hidden">{{.Content}}</pre>

<!-- AI Generation Modal -->
<div id="ai-modal" class="ai-modal">
    <div class="ai-modal-backdrop" onclick="closeAIDialog()"></div>
    <div class="surface-elevated ai-modal-content">
        <h2 id="ai-modal-title" class="ai-modal-title"></h2>
        <p id="ai-modal-desc" class="form-hint form-hint--flush"></p>

        <div class="form-group">
            <label class="form-label">Model</label>
            <div class="ai-model-grid">
                <label class="type-card ai-model-card" onclick="selectModel(this, 'haiku')">
                    <input type="radio" name="ai-model" value="haiku">
                    <div class="ai-model-name">Haiku</div>
                    <div class="ai-model-desc">Fast</div>
                </label>
                <label class="type-card ai-model-card" onclick="selectModel(this, 'sonnet')">
                    <input type="radio" name="ai-model" value="sonnet">
                    <div class="ai-model-name">Sonnet</div>
                    <div class="ai-model-desc">Balanced</div>
                </label>
                <label class="type-card active ai-model-card" onclick="selectModel(this, 'opus')">
                    <input type="radio" name="ai-model" value="opus" checked>
                    <div class="ai-model-name">Opus</div>
                    <div class="ai-model-desc">Best</div>
                </label>
            </div>
        </div>

        <!-- Hook event selector (only for script mode) -->
        <div id="ai-events-section" class="form-group">
            <label class="form-label">Hook Events <span class="form-label-optional">(which payloads should the script handle?)</span></label>
            <div id="ai-events-tags" class="flex flex-wrap gap-1.5 mb-2"></div>
            <div class="flex gap-1.5">
                <button type="button" class="btn-ghost btn-ghost--xs" onclick="toggleAllEvents(true)">Select All</button>
                <button type="button" class="btn-ghost btn-ghost--xs" onclick="toggleAllEvents(false)">Clear</button>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">What do you want?</label>
            <textarea id="ai-prompt" class="input" rows="4" placeholder="Describe what the script should do..."></textarea>
        </div>

        <div class="flex items-center justify-end gap-3">
            <button class="btn-secondary" onclick="closeAIDialog()">Cancel</button>
            <button id="ai-submit-btn" class="btn-primary" onclick="submitAIGeneration()">
                <i class="fa-solid fa-wand-magic-sparkles mr-1.5"></i> Generate
            </button>
        </div>

        <div id="ai-loading" class="hidden ai-loading">
            <i class="fa-solid fa-spinner fa-spin mr-1.5"></i> Generating...
        </div>
    </div>
</div>

<div id="toast" class="toast hidden toast-success"></div>

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>

function updateConsolePayload() {
    var event = document.getElementById('console-event').value;
    document.getElementById('console-payload').value = samples[event] || '{}';
}

function clearConsole() {
    document.getElementById('console-output').innerHTML = '<span class="color-muted">Console cleared.</span>';
    document.getElementById('console-meta').textContent = '';
}

function runTest() {
    var btn = document.getElementById('run-btn');
    var output = document.getElementById('console-output');
    var meta = document.getElementById('console-meta');

    // Auto-save first
    var editorContent = window._monacoEditor ? window._monacoEditor.getValue() : '';
    if (editorContent) {
        fetch('/api/scripts/{{.Filename}}', { method: 'PUT', body: editorContent });
    }

    var payloadStr = document.getElementById('console-payload').value || '{}';
    var payload;
    try {
        payload = JSON.parse(payloadStr);
    } catch(e) {
        output.innerHTML = '<span class="color-error">Error: Invalid JSON in payload</span>';
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> Running...';
    output.innerHTML = '<span class="color-muted">Executing {{.Filename}}...</span>';
    meta.textContent = '';

    fetch('/api/scripts/{{.Filename}}/test', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ payload: payload })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        var lines = [];
        var exitClass = data.exit_code === 0 ? 'color-success' : 'color-danger';
        var exitLabel = data.exit_code === 0 ? 'OK' : (data.exit_code === 2 ? 'BLOCKED' : 'ERROR');

        meta.innerHTML = '<span class="' + exitClass + '">exit ' + data.exit_code + ' (' + exitLabel + ')</span> <span class="color-muted">' + data.duration_ms + 'ms</span>';

        if (data.timed_out) {
            lines.push('<span class="color-error font-bold">TIMED OUT</span>');
        }

        if (data.stdout) {
            lines.push('<span class="color-muted font-sm text-uppercase">stdout</span>');
            // Try to pretty-print JSON
            try {
                var parsed = JSON.parse(data.stdout);
                lines.push('<span class="color-success">' + escapeHtml(JSON.stringify(parsed, null, 2)) + '</span>');
            } catch(e) {
                lines.push('<span class="color-success">' + escapeHtml(data.stdout) + '</span>');
            }
        }

        if (data.stderr) {
            if (data.stdout) lines.push('');
            lines.push('<span class="color-muted font-sm text-uppercase">stderr</span>');
            lines.push('<span class="color-secondary">' + escapeHtml(data.stderr) + '</span>');
        }

        if (!data.stdout && !data.stderr && !data.timed_out) {
            lines.push('<span class="color-muted">(no output)</span>');
        }

        output.innerHTML = lines.join('\n');
    })
    .catch(function(err) {
        output.innerHTML = '<span class="color-error">Request failed: ' + escapeHtml(String(err)) + '</span>';
    })
    .finally(function() {
        btn.disabled = false;
        btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg> Run';
    });
}

function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function saveDescription() {
    var desc = document.getElementById('script-description').value;
    fetch('/api/scripts/{{.Filename}}/meta', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ description: desc })
    });
}

function showToast(msg, isError) {
    var toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast ' + (isError ? 'toast-error' : 'toast-success');
    setTimeout(function() { toast.classList.add('hidden'); }, 3000);
}

// --- AI Generation ---
var aiMode = 'script';
var selectedModel = 'opus';
var selectedEvents = {};

var allHookEvents = [
    'PreToolUse', 'PostToolUse', 'PostToolUseFailure',
    'UserPromptSubmit', 'PermissionRequest',
    'Stop', 'StopFailure', 'SubagentStart', 'SubagentStop',
    'SessionStart', 'SessionEnd',
    'Notification', 'InstructionsLoaded', 'ConfigChange',
    'CwdChanged', 'FileChanged',
    'TeammateIdle', 'TaskCompleted',
    'WorktreeCreate', 'WorktreeRemove',
    'PreCompact', 'PostCompact',
    'Elicitation', 'ElicitationResult'
];

function buildEventTags() {
    var container = document.getElementById('ai-events-tags');
    container.innerHTML = '';
    allHookEvents.forEach(function(ev) {
        var tag = document.createElement('span');
        tag.className = 'tag' + (selectedEvents[ev] ? ' active' : '');
        tag.textContent = ev;
        tag.onclick = function() {
            selectedEvents[ev] = !selectedEvents[ev];
            tag.classList.toggle('active', selectedEvents[ev]);
        };
        container.appendChild(tag);
    });
}

function toggleAllEvents(on) {
    allHookEvents.forEach(function(ev) { selectedEvents[ev] = on; });
    buildEventTags();
}

function getSelectedEvents() {
    var selected = [];
    allHookEvents.forEach(function(ev) {
        if (selectedEvents[ev]) selected.push(ev);
    });
    return selected; // empty = all events
}

function openAIDialog(mode) {
    aiMode = mode;
    var modal = document.getElementById('ai-modal');
    var title = document.getElementById('ai-modal-title');
    var desc = document.getElementById('ai-modal-desc');
    var eventsSection = document.getElementById('ai-events-section');

    if (mode === 'script') {
        title.textContent = 'Generate Script';
        desc.textContent = 'Describe what this hook script should do. Select which hook events it should handle — only those payload shapes will be included as context.';
        eventsSection.classList.remove('hidden');
        buildEventTags();
    } else {
        title.textContent = 'Generate Test Payload';
        desc.textContent = 'Describe the test scenario. The AI uses your script and the selected event shape to generate a realistic payload.';
        eventsSection.classList.add('hidden');
    }

    modal.classList.add('open');
    document.getElementById('ai-prompt').focus();
}

function closeAIDialog() {
    document.getElementById('ai-modal').classList.remove('open');
    document.getElementById('ai-loading').classList.add('hidden');
}

function selectModel(el, model) {
    selectedModel = model;
    document.querySelectorAll('[name=ai-model]').forEach(function(r) {
        r.closest('.type-card').classList.remove('active');
    });
    el.classList.add('active');
    el.querySelector('input').checked = true;
}

function submitAIGeneration() {
    var prompt = document.getElementById('ai-prompt').value.trim();
    if (!prompt) return;

    var loading = document.getElementById('ai-loading');
    var submitBtn = document.getElementById('ai-submit-btn');
    loading.classList.remove('hidden');
    submitBtn.disabled = true;

    var context = window._monacoEditor ? window._monacoEditor.getValue() : '';

    fetch('/api/ai/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            prompt: prompt,
            model: selectedModel,
            context: context,
            filename: '{{.Filename}}',
            mode: aiMode,
            event: document.getElementById('console-event').value,
            events: aiMode === 'script' ? getSelectedEvents() : []
        })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.error) {
            showToast('Error: ' + data.error, true);
            return;
        }
        if (aiMode === 'script' && window._monacoEditor) {
            window._monacoEditor.setValue(data.content);
            _savedContent = data.content;
            fetch('/api/scripts/{{.Filename}}', { method: 'PUT', body: data.content });
            showToast('Script generated and saved');
        } else if (aiMode === 'test') {
            try {
                var parsed = JSON.parse(data.content);
                document.getElementById('console-payload').value = JSON.stringify(parsed, null, 2);
            } catch(e) {
                document.getElementById('console-payload').value = data.content;
            }
            showToast('Test payload generated');
        }
        closeAIDialog();
    })
    .catch(function(err) {
        showToast('Generation failed: ' + err, true);
    })
    .finally(function() {
        loading.classList.add('hidden');
        submitBtn.disabled = false;
    });
}

// --- Script Navigation ---
var _savedContent = document.getElementById('script-content').textContent;

function isDirty() {
    if (!window._monacoEditor) return false;
    return window._monacoEditor.getValue() !== _savedContent;
}

function toggleScriptNav() {
    var nav = document.getElementById('script-nav');
    var isOpen = nav.classList.contains('open');
    if (isOpen) {
        nav.classList.remove('open');
        return;
    }
    fetch('/api/scripts')
    .then(function(r) { return r.json(); })
    .then(function(scripts) {
        var panel = document.getElementById('script-nav-panel');
        var current = '{{.Filename}}';
        var html = '';
        (scripts || []).forEach(function(s) {
            var isCurrent = s.filename === current;
            var checkClass = isCurrent ? 'script-nav-check' : 'script-nav-check hidden';
            var itemClass = isCurrent ? 'script-nav-item active' : 'script-nav-item';
            html += '<div class="' + itemClass + '" onclick="navigateToScript(\'' + escapeHtml(s.filename) + '\')">';
            html += '<svg class="' + checkClass + '" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
            html += '<div class="script-nav-detail"><span class="script-nav-name">' + escapeHtml(s.filename) + '</span>';
            if (s.description) {
                html += '<span class="script-nav-desc">' + escapeHtml(s.description) + '</span>';
            }
            html += '</div></div>';
        });
        if (!scripts || !scripts.length) {
            html = '<div style="padding:12px;color:var(--text-muted);font-size:13px;">No scripts found.</div>';
        }
        panel.innerHTML = html;
        nav.classList.add('open');
    });
}

function navigateToScript(filename) {
    if (filename === '{{.Filename}}') {
        document.getElementById('script-nav').classList.remove('open');
        return;
    }
    if (isDirty()) {
        if (!confirm('You have unsaved changes. Are you sure you want to leave?')) {
            return;
        }
    }
    window.location.href = '/scripts/' + encodeURIComponent(filename);
}

document.addEventListener('click', function(e) {
    var nav = document.getElementById('script-nav');
    if (nav && !nav.contains(e.target)) {
        nav.classList.remove('open');
    }
});

// --- Test Case Management ---
function loadTestCases() {
    var script = '{{.Filename}}';
    var event = document.getElementById('console-event').value;
    fetch('/api/testcases/' + encodeURIComponent(script) + '/' + event)
    .then(function(r) { return r.json(); })
    .then(function(cases) {
        var sel = document.getElementById('testcase-select');
        while (sel.options.length > 1) sel.remove(1);
        (cases || []).forEach(function(tc) {
            var opt = document.createElement('option');
            opt.value = tc.filename;
            opt.textContent = tc.title;
            sel.appendChild(opt);
        });
        if (window.HMDropdown) HMDropdown.refresh(sel);
    });
}

function loadTestCase() {
    var sel = document.getElementById('testcase-select');
    if (!sel.value) {
        updateConsolePayload();
        return;
    }
    var script = '{{.Filename}}';
    var event = document.getElementById('console-event').value;
    fetch('/api/testcases/' + encodeURIComponent(script) + '/' + event + '/' + sel.value)
    .then(function(r) { return r.json(); })
    .then(function(tc) {
        document.getElementById('console-payload').value = JSON.stringify(tc.payload, null, 2);
    });
}

function saveCurrentTestCase() {
    var payload;
    try {
        payload = JSON.parse(document.getElementById('console-payload').value);
    } catch(e) {
        showToast('Invalid JSON payload', true);
        return;
    }
    var title = prompt('Name this test case:');
    if (!title) return;

    var script = '{{.Filename}}';
    var event = document.getElementById('console-event').value;
    fetch('/api/testcases/' + encodeURIComponent(script) + '/' + event, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: title, payload: payload })
    })
    .then(function(r) {
        if (r.ok) {
            showToast('Test case saved');
            loadTestCases();
        } else {
            r.text().then(function(t) { showToast('Error: ' + t, true); });
        }
    });
}

// Wrap updateConsolePayload to also reload test cases
var _origUpdateConsolePayload = updateConsolePayload;
updateConsolePayload = function() {
    _origUpdateConsolePayload();
    loadTestCases();
};

// Initialize
updateConsolePayload();

require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs' }});
require(['vs/editor/editor.main'], function(monaco) {
    var editorLang = '{{.Language}}';

    // ─── IntelliSense for TypeScript / JavaScript ──────────────────────
    if (editorLang === 'typescript' || editorLang === 'javascript') {
        var isTS = editorLang === 'typescript';
        var defaults = isTS
            ? monaco.languages.typescript.typescriptDefaults
            : monaco.languages.typescript.javascriptDefaults;

        defaults.setCompilerOptions({
            target: monaco.languages.typescript.ScriptTarget.ES2020,
            module: monaco.languages.typescript.ModuleKind.CommonJS,
            moduleResolution: monaco.languages.typescript.ModuleResolutionKind.NodeJs,
            allowNonTsExtensions: true,
            allowJs: true,
            checkJs: !isTS,
            strict: false,
            noEmit: true,
            esModuleInterop: true,
            allowSyntheticDefaultImports: true,
        });

        defaults.setDiagnosticsOptions({ noSemanticValidation: false, noSyntaxValidation: false });

        // Fetch hook payload types and runtime stubs from the server
        fetch('/api/types/hooks')
        .then(function(r) { return r.text(); })
        .then(function(dts) {
            defaults.addExtraLib(dts, 'file:///node_modules/@types/hook-manager/index.d.ts');
        });
    }

    // Create model with a file URI so the TS compiler sees the correct extension
    var modelUri = monaco.Uri.parse('file:///hook-scripts/{{.Filename}}');
    var model = monaco.editor.createModel(
        document.getElementById('script-content').textContent,
        editorLang,
        modelUri
    );

    var editor = monaco.editor.create(document.getElementById('editor-container'), {
        model: model,
        theme: 'vs-dark',
        minimap: { enabled: false },
        automaticLayout: true,
        fontSize: 14,
        quickSuggestions: { other: true, comments: false, strings: true },
        suggestOnTriggerCharacters: true,
        parameterHints: { enabled: true },
    });

    window._monacoEditor = editor;

    document.getElementById('save-btn').addEventListener('click', function() {
        var btn = document.getElementById('save-btn');
        btn.disabled = true;
        btn.textContent = 'Saving...';
        fetch('/api/scripts/{{.Filename}}', {
            method: 'PUT',
            body: editor.getValue()
        }).then(function(r) {
            if (r.ok) {
                _savedContent = editor.getValue();
                document.getElementById('save-status').textContent = 'Saved!';
                setTimeout(function() { document.getElementById('save-status').textContent = ''; }, 2000);
            } else {
                r.text().then(function(t) { showToast('Error: ' + t, true); });
            }
        }).catch(function(err) {
            showToast('Save failed: ' + err, true);
        }).finally(function() {
            btn.disabled = false;
            btn.textContent = 'Save';
        });
    });

    // Ctrl+S / Cmd+S shortcut
    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, function() {
        document.getElementById('save-btn').click();
    });

    // Resize handle drag logic
    var handle = document.getElementById('resize-handle');
    var editorEl = document.getElementById('editor-container');
    var consoleEl = document.getElementById('console-panel');
    var layoutEl = editorEl.parentElement;
    var isResizing = false;

    handle.addEventListener('mousedown', function(e) {
        isResizing = true;
        document.body.classList.add('resizing');
        layoutEl.classList.add('resizing-active');
        e.preventDefault();
    });

    document.addEventListener('mousemove', function(e) {
        if (!isResizing) return;
        var containerRect = layoutEl.getBoundingClientRect();
        var headerHeight = editorEl.offsetTop - containerRect.top;
        var handleHeight = handle.offsetHeight;
        var available = containerRect.height - headerHeight - handleHeight;
        var mouseY = e.clientY - containerRect.top - headerHeight;
        var editorHeight = Math.max(150, Math.min(available - 120, mouseY));
        var consoleHeight = available - editorHeight;
        layoutEl.style.setProperty('--editor-h', editorHeight + 'px');
        layoutEl.style.setProperty('--console-h', consoleHeight + 'px');
        editor.layout();
    });

    document.addEventListener('mouseup', function() {
        if (isResizing) {
            isResizing = false;
            document.body.classList.remove('resizing');
        }
    });
});
</script>
