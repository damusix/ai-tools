<!-- Server control confirmation dialog -->
<div id="server-dialog-overlay" class="dialog-overlay" onclick="closeServerDialog()"></div>
<div id="server-dialog" class="dialog">
    <div class="dialog-header">
        <div id="server-dialog-icon" class="dialog-icon"></div>
        <div>
            <div id="server-dialog-title" class="dialog-title"></div>
            <div id="server-dialog-subtitle" class="dialog-subtitle"></div>
        </div>
    </div>
    <p id="server-dialog-msg" class="dialog-msg"></p>
    <div class="dialog-actions">
        <button onclick="closeServerDialog()" class="dialog-cancel">Cancel</button>
        <button id="server-dialog-confirm" class="dialog-confirm"></button>
    </div>
</div>

<script>
(function() {
    var path = window.location.pathname;
    var links = document.querySelectorAll('.nav-link');
    for (var i = 0; i < links.length; i++) {
        var href = links[i].getAttribute('href');
        if (path === href || (href !== '/' && path.startsWith(href))) {
            links[i].classList.add('active');
        }
    }
})();

var _serverDialogAction = '';

function showServerDialog(action) {
    _serverDialogAction = action;
    var overlay = document.getElementById('server-dialog-overlay');
    var dialog = document.getElementById('server-dialog');
    var icon = document.getElementById('server-dialog-icon');
    var title = document.getElementById('server-dialog-title');
    var subtitle = document.getElementById('server-dialog-subtitle');
    var msg = document.getElementById('server-dialog-msg');
    var btn = document.getElementById('server-dialog-confirm');

    if (action === 'stop') {
        icon.className = 'dialog-icon dialog-icon--danger';
        icon.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>';
        title.textContent = 'Stop Server';
        subtitle.textContent = 'This will shut down the process';
        msg.textContent = 'The Hook Manager server will stop and this page will become unreachable. You will need to manually restart it from the terminal.';
        btn.textContent = 'Stop Server';
        btn.className = 'dialog-confirm dialog-confirm--stop';
    } else {
        icon.className = 'dialog-icon dialog-icon--warning';
        icon.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>';
        title.textContent = 'Restart Server';
        subtitle.textContent = 'Applies config changes (port, log level)';
        msg.textContent = 'The server will shut down and relaunch. This page will automatically reconnect when the server is back.';
        btn.textContent = 'Restart Server';
        btn.className = 'dialog-confirm dialog-confirm--restart';
    }

    btn.onclick = function() { confirmServerAction(); };
    overlay.classList.add('open');
    dialog.classList.add('open');
    document.addEventListener('keydown', _serverDialogEsc);
}

function closeServerDialog() {
    document.getElementById('server-dialog-overlay').classList.remove('open');
    document.getElementById('server-dialog').classList.remove('open');
    document.removeEventListener('keydown', _serverDialogEsc);
}

function _serverDialogEsc(e) { if (e.key === 'Escape') closeServerDialog(); }

function confirmServerAction() {
    var btn = document.getElementById('server-dialog-confirm');
    btn.disabled = true;
    btn.textContent = _serverDialogAction === 'stop' ? 'Stopping...' : 'Restarting...';

    var endpoint = _serverDialogAction === 'stop' ? '/api/server/stop' : '/api/server/restart';

    fetch(endpoint, { method: 'POST' }).then(function() {
        if (_serverDialogAction === 'restart') {
            closeServerDialog();
            showReconnectBanner();
        } else {
            document.getElementById('server-dialog-msg').textContent = 'Server stopped. You can close this tab.';
            btn.classList.add('hidden');
        }
    }).catch(function() {
        closeServerDialog();
        if (_serverDialogAction === 'restart') {
            showReconnectBanner();
        }
    });
}

function showReconnectBanner() {
    var banner = document.createElement('div');
    banner.id = 'reconnect-banner';
    banner.className = 'reconnect-banner';
    banner.innerHTML = '<span class="reconnect-icon">&#8635;</span>Reconnecting to server...';
    document.body.appendChild(banner);

    var attempts = 0;
    var poll = setInterval(function() {
        attempts++;
        fetch('/health').then(function(r) {
            if (r.ok) {
                clearInterval(poll);
                window.location.reload();
            }
        }).catch(function() {});
        if (attempts > 60) {
            clearInterval(poll);
            banner.innerHTML = 'Could not reconnect. <a href="/" class="link">Try manually</a>';
        }
    }, 500);
}
</script>
